name: Publish NuGet Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for Trusted Publishing OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: |
          dotnet test tests/Cortex.Tests.Unit --no-build -c Release --logger "trx;LogFileName=unit.trx"
          dotnet test tests/Cortex.IO.Database.Tests --no-build -c Release --logger "trx;LogFileName=db.trx"
          dotnet test tests/Cortex.ML.Tests --no-build -c Release --logger "trx;LogFileName=ml.trx"
          dotnet test tests/Cortex.Streaming.Tests --no-build -c Release --logger "trx;LogFileName=streaming.trx"
          dotnet test tests/Cortex.Geo.Tests --no-build -c Release --logger "trx;LogFileName=geo.trx"
          dotnet test tests/Cortex.Text.Tests --no-build -c Release --logger "trx;LogFileName=text.trx"
          dotnet test tests/Cortex.TimeSeries.Tests --no-build -c Release --logger "trx;LogFileName=timeseries.trx"
          dotnet test tests/Cortex.SafeTensors.Tests --no-build -c Release --logger "trx;LogFileName=safetensors.trx"

      - name: Pack NuGet packages
        run: |
          dotnet pack src/Cortex/Cortex.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.ML/Cortex.ML.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.ML.MLNet/Cortex.ML.MLNet.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.ML.Torch/Cortex.ML.Torch.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.ML.Onnx/Cortex.ML.Onnx.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.IO.Database/Cortex.IO.Database.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Viz/Cortex.Viz.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Plot/Cortex.Plot.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Interactive/Cortex.Interactive.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Streaming/Cortex.Streaming.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Streaming.Kafka/Cortex.Streaming.Kafka.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Streaming.Redis/Cortex.Streaming.Redis.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Geo/Cortex.Geo.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Cloud/Cortex.Cloud.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Flight/Cortex.Flight.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Text/Cortex.Text.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.TimeSeries/Cortex.TimeSeries.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.SafeTensors/Cortex.SafeTensors.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.GPU/Cortex.GPU.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Cortex.Vision/Cortex.Vision.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs

      - name: List packages
        run: ls -la ./nupkgs/

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkgs/*.nupkg
